[build]
  # TypeScript + @types + @netlify/functions sont en dependencies pour que `tsc` existe
  # même si l’UI Netlify définit NODE_ENV=production (sinon devDependencies ignorées → échec du build).
  command = "npm run build"
  publish = "public"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"
  # Valeurs souvent « publiques » ou non sensibles, mais déclarent des faux positifs si elles = l’UI Netlify
  SECRETS_SCAN_OMIT_KEYS = "BYRD_BASE_URL,LOG_FILE_PATH,STAGING_SHOPIFY_STORE_DOMAIN"

[functions]
  node_bundler = "esbuild"

[functions."sync-uk"]
  schedule = "*/10 * * * *"

[functions."sync-uk-staging"]
  schedule = "*/10 * * * *"

# Rapport Slack « hier » (fuseau : SLACK_DAILY_DIGEST_TIMEZONE, défaut Europe/Paris).
# 6h UTC ≈ 7h Paris (hiver) ; ajuster selon l’heure souhaitée côté équipe.
[functions."daily-slack-digest"]
  schedule = "0 6 * * *"

